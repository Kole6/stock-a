<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock-A 股票行情</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1419;
      color: #e7e9ea;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .container { max-width: 960px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .subtitle { color: #71767b; font-size: 0.875rem; margin-bottom: 20px; }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    input {
      flex: 1;
      min-width: 200px;
      padding: 10px 12px;
      border: 1px solid #38444d;
      border-radius: 8px;
      background: #192734;
      color: #e7e9ea;
      font-size: 0.875rem;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #1d9bf0;
      color: #fff;
      font-size: 0.875rem;
      cursor: pointer;
    }
    button:hover { background: #1a8cd8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { color: #71767b; font-size: 0.8125rem; margin-bottom: 12px; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #192734;
      border-radius: 12px;
      overflow: hidden;
    }
    th, td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #38444d;
    }
    th { background: #22303c; color: #8899a6; font-weight: 500; font-size: 0.8125rem; }
    tr:last-child td { border-bottom: none; }
    .up { color: #f4212e; }
    .down { color: #00ba7c; }
    .flat { color: #8899a6; }
    .error { color: #f4212e; padding: 16px; background: #192734; border-radius: 8px; }
    @media (max-width: 600px) {
      th:nth-child(4), td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Stock-A 股票行情</h1>
    <p class="subtitle">数据来源：新浪财经 · 自动刷新 30 秒</p>

    <div class="toolbar">
      <input id="stockList" type="text" placeholder="股票代码，逗号分隔，如 sh000001,sz000001">
      <button id="refreshBtn" onclick="loadStocks()">刷新</button>
    </div>
    <div class="status" id="status">加载中...</div>
    <div id="content"></div>
  </div>

  <script>
    const DEFAULT_LIST = 'sh000001,sh601127,sh603108,sh513100,sz000572,sh600418,sz000868,sz002271,sh600733,sz000980,sz000625,hkHSMPI';

    function cleanName(name) {
      if (!name) return '-';
      return name.replace(/^[^=]*="/, '').replace(/"$/, '').trim();
    }

    function pcentClass(pcent) {
      if (!pcent) return 'flat';
      const val = parseFloat(pcent);
      if (val > 0) return 'up';
      if (val < 0) return 'down';
      return 'flat';
    }

    async function loadStocks() {
      const btn = document.getElementById('refreshBtn');
      const status = document.getElementById('status');
      const content = document.getElementById('content');
      const list = document.getElementById('stockList').value.trim() || DEFAULT_LIST;

      btn.disabled = true;
      status.textContent = '正在获取数据...';

      try {
        const res = await fetch('/stock?list=' + encodeURIComponent(list));
        if (!res.ok) throw new Error('请求失败: ' + res.status);
        const data = await res.json();

        const rows = Object.values(data).map(item => `
          <tr>
            <td>${cleanName(item.name)}</td>
            <td>${item.price ?? '-'}</td>
            <td class="${pcentClass(item.pcent)}">${item.pcent ?? '-'}</td>
            <td>${item.liang ?? '-'}</td>
          </tr>
        `).join('');

        content.innerHTML = `
          <table>
            <thead>
              <tr><th>名称</th><th>现价</th><th>涨跌幅</th><th>成交量(亿)</th></tr>
            </thead>
            <tbody>${rows || '<tr><td colspan="4">暂无数据</td></tr>'}</tbody>
          </table>
        `;
        status.textContent = '更新时间: ' + new Date().toLocaleString('zh-CN');
      } catch (err) {
        content.innerHTML = '';
        status.innerHTML = '<span class="error">' + err.message + '</span>';
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('stockList').value = DEFAULT_LIST;
    loadStocks();
    setInterval(loadStocks, 30000);
  </script>
</body>
</html>
